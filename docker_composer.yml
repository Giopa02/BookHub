# docker-compose.yml
services:
  mysql-laravel:
    image: mysql:8.4
    ports:
      - 3306:3306
    environment:
      # - MYSQL_ROOT_PASSWORD=bibliotek-root-password-laravel-2026
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
      # On créer un compte utilisateur non root pour Laravel
      - MYSQL_USER=bookhub
      - MYSQL_PASSWORD=bookhub-password-laravel-2026
      # On crée une base de données dédiée
      - MYSQL_DATABASE=bookhub
  phpmyadmin-laravel:
    image: phpmyadmin:5.2.3-apache
    ports:
      - 8080:80
    environment:
      - PMA_ARBITRARY=1